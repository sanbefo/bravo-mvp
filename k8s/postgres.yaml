apiVersion: v1
kind: Service
metadata:
  name: postgres
  namespace: bravo-mvp
spec:
  selector:
    app: postgres
  ports:
    - port: 5432
      targetPort: 5432
  clusterIP: None # Using a Headless Service is standard for StatefulSets
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: postgres
  namespace: bravo-mvp
spec:
  serviceName: "postgres"
  replicas: 1
  selector:
    matchLabels:
      app: postgres
  template:
    metadata:
      labels:
        app: postgres
    spec:
      containers:
        - name: postgres
          image: postgres:15
          ports:
            - containerPort: 5432
          env:
            - name: POSTGRES_DB
              value: bravo_db
            - name: POSTGRES_USER
              value: bravo
            - name: POSTGRES_PASSWORD
              value: bravo123
            # Important: Tell Postgres where to find the mounted data
            - name: PGDATA
              value: /var/lib/postgresql/data/pgdata
          volumeMounts:
            - name: postgres-storage
              mountPath: /var/lib/postgresql/data
  volumeClaimTemplates:
    - metadata:
        name: postgres-storage
      spec:
        accessModes: ["ReadWriteOnce"]
        resources:
          requests:
            storage: 5Gi # Adjust size as needed for your MVP
