apiVersion: apps/v1
kind: Deployment
metadata:
  name: sidekiq
  namespace: bravo-mvp
spec:
  replicas: 2
  selector:
    matchLabels:
      app: sidekiq
  template:
    metadata:
      labels:
        app: sidekiq
    spec:
      containers:
        - name: sidekiq
          image: bravo-mvp:latest
          imagePullPolicy: Never
          command: ["bundle", "exec", "sidekiq"]
          env:
            - name: DATABASE_URL
              value: postgres://bravo:bravo123@postgres.bravo-mvp:5432/bravo_db
            - name: REDIS_URL
              value: redis://redis.bravo-mvp:6379/0
